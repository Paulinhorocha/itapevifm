<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0015">
<title>Itapevi FM 87.9 — Maçambará</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0d0015;
  --card:#1a002d;
  --accent:#c0392b;
  --purple:#8e44ad;
  --text:#f0e6ff;
  --text2:#b39dcc;
  --border:rgba(180,100,255,0.15);
  --border2:rgba(180,100,255,0.3);
  --topbar-h:72px;
  --nav-h:52px;
  --header-total:124px;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: Inter, sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-top:var(--header-total);
}

/* TOPBAR */
#topbar {
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:var(--topbar-h);
  background:rgba(18,0,32,0.98);
  display:flex;
  align-items:center;
  padding:0 1rem;
  z-index:1000;
}

/* BOTÃO PLAY */
.play-btn {
  width:46px;
  height:46px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--purple));
  color:#fff;
  font-size:1.1rem;

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:0 2px 14px rgba(192,57,43,0.5);

  -webkit-tap-highlight-color: transparent;
  -webkit-appearance:none;
  appearance:none;
  touch-action:manipulation;
}

.play-btn:hover {
  transform:scale(1.05);
}

.play-btn:active,
.play-btn:focus,
.play-btn:focus-visible {
  outline:none !important;
  box-shadow:0 2px 14px rgba(192,57,43,0.5);
}

/* PLAYER STATUS */
.player-status {
  font-size:11px;
  color:var(--text2);
  margin-left:10px;
}

/* STREAM BOX */
.stream-cfg {
  display:none;
  position:absolute;
  top:80px;
  right:10px;
  background:#200035;
  padding:12px;
  border-radius:10px;
  width:260px;
}

.stream-cfg.open {
  display:block;
}

.stream-cfg input {
  width:100%;
  padding:8px;
  border:none;
  border-radius:6px;
}

/* MOBILE FIX */
@media(max-width:680px) {
  .play-btn {
    width:50px;
    height:50px;
  }
}
</style>
</head>

<body>

<div id="topbar">

  <div style="flex:1">
    <strong>ITAPEVI FM</strong>
  </div>

  <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>

  <div class="player-status" id="playerStatus">Pronto</div>

</div>

<div class="stream-cfg" id="streamCfg">
  <input id="streamUrl" value="https://casthttps1.suaradionanet.net/10076/stream">
  <button onclick="applyStream()">Aplicar</button>
</div>

<audio id="radioAudio" preload="none"></audio>

<script>
const audio = document.getElementById('radioAudio');
let playing = false;

let STREAM_URL = 'https://casthttps1.suaradionanet.net/10076/stream';

function togglePlay() {
  if (playing) stopPlay();
  else startPlay();
}

function startPlay() {
  const st = document.getElementById('playerStatus');
  const btn = document.getElementById('playBtn');

  st.textContent = "Carregando…";

  audio.src = STREAM_URL;
  audio.load();

  audio.play().then(() => {
    playing = true;
    btn.textContent = "⏸";
    st.textContent = "Ao vivo";
  }).catch(() => {
    st.textContent = "Erro";
  });
}

function stopPlay() {
  const btn = document.getElementById('playBtn');

  audio.pause();
  audio.removeAttribute('src');
  audio.load();

  playing = false;
  btn.textContent = "▶";

  document.getElementById('playerStatus').textContent = "Pausado";
}

function applyStream() {
  const val = document.getElementById('streamUrl').value;
  STREAM_URL = val;

  if (playing) {
    stopPlay();
    setTimeout(startPlay, 300);
  } else {
    startPlay();
  }
}
</script>

</body>
</html>
